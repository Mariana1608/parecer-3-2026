<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parecer Referencial nº 3/2026 — Como Usar</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Nunito+Sans:wght@400;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Nunito Sans", sans-serif;
    background: #1a2744;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; overflow: hidden;
  }
  #app {
    width: 780px; height: 540px;
    background: #f0f4ff; border-radius: 20px;
    overflow: hidden; position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .top-bar {
    position: absolute; top: 0; left: 0; right: 0; height: 56px;
    background: #1e3a8a;
    display: flex; align-items: center; padding: 0 16px; gap: 12px; z-index: 100;
  }
  .logo-img {
    height: 38px; width: auto;
    background: white; border-radius: 6px; padding: 3px 6px;
    flex-shrink: 0;
  }
  .top-bar-titles { display: flex; flex-direction: column; gap: 1px; }
  .top-bar-title { font-family: "Nunito", sans-serif; color: #fff; font-size: 12px; font-weight: 700; line-height: 1.3; }
  .top-bar-subtitle { font-family: "Nunito", sans-serif; color: #93c5fd; font-size: 10px; font-weight: 600; }
  .pgm-badge {
    margin-left: auto; background: #3b82f6; color: #fff;
    font-family: "Nunito", sans-serif; font-size: 10px; font-weight: 800;
    padding: 3px 8px; border-radius: 20px; letter-spacing: 0.5px; flex-shrink: 0;
  }
  #stage {
    position: absolute; top: 56px; left: 0; right: 0; bottom: 100px; overflow: hidden;
  }
  .wall {
    position: absolute; top: 0; left: 0; right: 0; bottom: 90px;
    background: linear-gradient(180deg, #e0e7ff 0%, #dbeafe 100%);
  }
  .floor {
    position: absolute; bottom: 0; left: 0; right: 0; height: 90px;
    background: linear-gradient(180deg, #dbeafe 0%, #bfdbfe 100%);
    border-top: 3px solid #93c5fd;
  }
  #character {
    position: absolute; bottom: 80px; left: 80px; width: 110px;
    transition: left 0.8s cubic-bezier(.4,0,.2,1); z-index: 10;
  }
  @keyframes body-bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
  #char-body-group { animation: body-bounce 2s ease-in-out infinite; transform-origin: 55px 90px; }
  @keyframes mouth-open { 0%,100%{transform:scaleY(1)} 50%{transform:scaleY(1.8)} }
  #char-mouth-group { transform-origin: 55px 60px; }
  #char-mouth-group.talking { animation: mouth-open 0.22s ease-in-out infinite; }

  #bubble {
    position: absolute; left: 200px; bottom: 148px; max-width: 450px;
    background: #fff; border-radius: 18px; padding: 14px 18px;
    box-shadow: 0 4px 20px rgba(30,58,138,.15); border: 2px solid #dbeafe;
    z-index: 20; opacity: 0; transform: translateY(10px) scale(0.97);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  #bubble::before {
    content: ""; position: absolute; left: -14px; bottom: 22px;
    border: 8px solid transparent; border-right-color: #dbeafe;
  }
  #bubble::after {
    content: ""; position: absolute; left: -10px; bottom: 24px;
    border: 6px solid transparent; border-right-color: #fff;
  }
  #bubble.visible { opacity: 1; transform: translateY(0) scale(1); }
  #bubble-title {
    font-family: "Nunito", sans-serif; font-size: 13px; font-weight: 800;
    color: #1e3a8a; margin-bottom: 6px;
  }
  #bubble-text { font-size: 12.5px; color: #374151; line-height: 1.6; }

  .prop { position: absolute; transition: opacity 0.5s; opacity: 0; pointer-events: none; }
  .prop.show { opacity: 1; }
  #board { right: 30px; bottom: 88px; width: 160px; }
  #docs  { right: 40px; bottom: 88px; width: 140px; }
  #calendar { right: 50px; bottom: 88px; width: 120px; }

  #voice-bar {
    position: absolute; bottom: 100px; left: 0; right: 0; height: 4px;
    background: #dbeafe; z-index: 100;
  }
  #voice-fill {
    height: 100%;
    background: linear-gradient(90deg, #2563eb, #3b82f6);
    width: 0%; transition: width 0.4s ease;
  }

  #controls {
    position: absolute; bottom: 0; left: 0; right: 0; height: 100px;
    background: #1e3a8a;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; padding: 0 20px; z-index: 100;
  }
  .controls-row { display: flex; align-items: center; justify-content: space-between; width: 100%; }
  .step-dots { display: flex; gap: 7px; }
  .dot {
    width: 8px; height: 8px; border-radius: 50%; background: #3b82f6;
    opacity: 0.4; transition: opacity 0.3s, transform 0.3s; cursor: pointer;
  }
  .dot.active { opacity: 1; transform: scale(1.3); }
  .btn {
    font-family: "Nunito", sans-serif; font-weight: 800; font-size: 13px;
    border: none; border-radius: 10px; cursor: pointer; padding: 9px 18px; transition: all 0.2s;
  }
  #btn-prev { background: transparent; color: #93c5fd; border: 2px solid #3b82f6; }
  #btn-prev:hover:not(:disabled) { background: #1d4ed8; }
  #btn-prev:disabled { opacity: 0.4; cursor: default; }
  #btn-next { background: #3b82f6; color: #fff; }
  #btn-next:hover:not(:disabled) { background: #2563eb; transform: translateY(-1px); }
  #btn-next:disabled { background: #475569; cursor: default; transform: none; }

  .voice-row { display: flex; align-items: center; gap: 10px; }
  #btn-voice {
    font-family: "Nunito", sans-serif; font-weight: 800; font-size: 12px;
    border: none; border-radius: 8px; cursor: pointer; padding: 6px 14px;
    background: #10b981; color: #fff; transition: all 0.2s; display: flex; align-items: center; gap: 5px;
  }
  #btn-voice:hover { background: #059669; }
  #btn-voice.playing { background: #ef4444; }
  #btn-voice.playing:hover { background: #dc2626; }
  #voice-status { font-family: "Nunito", sans-serif; font-size: 11px; color: #93c5fd; }
  #step-label { font-family: "Nunito", sans-serif; font-size: 11px; color: #93c5fd; font-weight: 600; }

  .eq-bars { display: none; flex-gap: 2px; align-items: flex-end; height: 14px; gap: 2px; }
  .eq-bar { width: 3px; background: #10b981; border-radius: 2px; }
  @keyframes eq1 { 0%,100%{height:4px} 50%{height:12px} }
  @keyframes eq2 { 0%,100%{height:8px} 50%{height:4px} }
  @keyframes eq3 { 0%,100%{height:6px} 50%{height:14px} }
  @keyframes eq4 { 0%,100%{height:10px} 50%{height:3px} }
  .eq-bar:nth-child(1) { animation: eq1 0.5s ease infinite; height:4px; }
  .eq-bar:nth-child(2) { animation: eq2 0.4s ease infinite; height:8px; }
  .eq-bar:nth-child(3) { animation: eq3 0.6s ease infinite; height:6px; }
  .eq-bar:nth-child(4) { animation: eq4 0.45s ease infinite; height:10px; }
  .eq-bars.active { display: flex; }

  .highlight-box {
    background: #eff6ff; border-left: 4px solid #3b82f6; border-radius: 6px;
    padding: 7px 10px; margin-top: 7px; font-size: 11.5px; color: #1e40af; font-weight: 600;
  }
  .tag {
    display: inline-block; background: #dbeafe; color: #1e3a8a;
    font-family: "Nunito", sans-serif; font-size: 10px; font-weight: 800;
    padding: 2px 7px; border-radius: 20px; margin-right: 4px; margin-bottom: 3px;
  }
  .tag.green { background: #d1fae5; color: #065f46; }
  .tag.red   { background: #fee2e2; color: #991b1b; }
  .ci { display: flex; align-items: flex-start; gap: 7px; font-size: 12px; color: #374151; margin: 4px 0; }
  .ci-icon { font-size: 13px; margin-top: 1px; flex-shrink: 0; }
</style>
</head>

let current = 0;
const synth = window.speechSynthesis;
let utterance = null;
let ptVoice = null;

function loadVoices() {
  const voices = synth.getVoices();
  if (!voices.length) return;
  ptVoice = voices.find(v => v.lang === "pt-BR")
          || voices.find(v => v.lang.startsWith("pt"))
          || voices[0];
  document.getElementById("voice-status").textContent =
    ptVoice ? ptVoice.name.substring(0,30) : "voz padrão";
}
loadVoices();
if (speechSynthesis.onvoiceschanged !== undefined)
  speechSynthesis.onvoiceschanged = loadVoices;

const bubble     = document.getElementById("bubble");
const bTitle     = document.getElementById("bubble-title");
const bText      = document.getElementById("bubble-text");
const character  = document.getElementById("character");

const btnNext    = document.getElementById("btn-next");

const vStatus    = document.getElementById("voice-status");
const stepLabel  = document.getElementById("step-label");
const dotsEl     = document.getElementById("dots");
const eq         = document.getElementById("eq");
const mouthGrp   = document.getElementById("char-mouth-group");
const props      = { board: document.getElementById("board"), docs: document.getElementById("docs"), calendar: document.getElementById("calendar") };

STEPS.forEach((_, i) => {
  const d = document.createElement("div");
  d.className = "dot";
  d.onclick = () => goTo(i);
  dotsEl.appendChild(d);
});

function stopSpeech() {
  if (synth.speaking) synth.cancel();
  btnVoice.textContent = "🔊 Ouvir narração";
  btnVoice.classList.remove("playing");
  eq.classList.remove("active");
  mouthGrp.classList.remove("talking");
  vFill.style.width = "0%";
}

function speakStep(idx) {
  if (!("speechSynthesis" in window)) { vStatus.textContent = "⚠ Sem suporte a voz"; return; }
  stopSpeech();
  const step = STEPS[idx];
  utterance = new SpeechSynthesisUtterance(step.voice);
  if (ptVoice) utterance.voice = ptVoice;
  utterance.lang  = "pt-BR";
  utterance.rate  = 1.18;
  utterance.pitch = 1.05;
  utterance.volume = 1.0;

  let progTimer = null;
  const estMs = step.voice.length * 38;
  let elapsed = 0;

  utterance.onstart = () => {
    btnVoice.textContent = "⏹ Parar";
    btnVoice.classList.add("playing");
    eq.classList.add("active");
    mouthGrp.classList.add("talking");
    vStatus.textContent = "Narrando.";
    elapsed = 0;
    progTimer = setInterval(() => {
      elapsed += 200;
      vFill.style.width = Math.min(elapsed / estMs * 100, 95) + "%";
    }, 200);
  };

  utterance.onend = () => {
    clearInterval(progTimer);
    vFill.style.width = "100%";
    setTimeout(() => { vFill.style.width = "0%"; }, 700);
    btnVoice.textContent = "🔊 Ouvir narração";
    btnVoice.classList.remove("playing");
    eq.classList.remove("active");
    mouthGrp.classList.remove("talking");
    vStatus.textContent = "Concluído ✓";
  };

  utterance.onerror = () => {
    clearInterval(progTimer);
    stopSpeech();
    vStatus.textContent = "⚠ Erro na síntese";
  };

  synth.speak(utterance);
}

btnVoice.addEventListener("click", () => {
  if (synth.speaking) { stopSpeech(); vStatus.textContent = "Pausado"; }
  else speakStep(current);
});

function showProp(id) {
  Object.entries(props).forEach(([k, el]) => { if (el) el.classList.toggle("show", k === id); });
}
function showPaper(show) {
  ["char-paper","cpl1","cpl2","cpl3"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.setAttribute("opacity", show ? "1" : "0");
  });
}

function goTo(idx) {
  stopSpeech();
  bubble.classList.remove("visible");
  setTimeout(() => {
    current = idx;
    const s = STEPS[current];
    character.style.left = s.charX + "px";
    showProp(s.prop);
    showPaper(current === 4 || current === 5);
    bTitle.textContent = s.title;
    bText.innerHTML = "";
    document.querySelectorAll(".dot").forEach((d, i) => d.classList.toggle("active", i === current));
    stepLabel.textContent = "Passo " + (current + 1) + " de " + STEPS.length;
    btnPrev.disabled = current === 0;
    btnNext.disabled = current === STEPS.length - 1;
    btnNext.textContent = current === STEPS.length - 1 ? "✓ Fim" : "Próximo →";
    vStatus.textContent = "Clique 🔊 para ouvir";
    setTimeout(() => {
      bubble.classList.add("visible");
      bText.style.opacity = "0";
      bText.innerHTML = s.html;
      let op = 0;
      const fade = setInterval(() => {
        op += 0.1; bText.style.opacity = Math.min(op, 1);
        if (op >= 1) clearInterval(fade);
      }, 20);
    }, 200);
  }, 280);
}

btnNext.addEventListener("click", () => { if (current < STEPS.length - 1) goTo(current + 1); });
btnPrev.addEventListener("click", () => { if (current > 0) goTo(current - 1); });
document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight" && current < STEPS.length - 1) goTo(current + 1);
  if (e.key === "ArrowLeft" && current > 0) goTo(current - 1);
  if (e.key === " ") { e.preventDefault(); btnVoice.click(); }
});

goTo(0);
</script>
</body>
</html>
